<!DOCTYPE html>
<html>
<head>
  <title>정부 유튜브 구독자 비교</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>정부 유튜브 구독자 비교</h2>
<canvas id="chart" width="400" height="200"></canvas>

<script>
const API_KEY = "AIzaSyApveUQ9s1B-iIKw6buFBTm2s6UnHxa1Kg";

const channels = [
  { name: "농식품부", id: "UCtF8qHj8c7s8wYk5YdZk8mg" },
  { name: "환경부", id: "UCV8rGJXbO9d2XK8m1R9H2WQ" },
  { name: "문체부", id: "UC9mJ4Zy7LwK8V5d3gF2Qp1A" },
  { name: "국토부", id: "UCkY4lP6nB3x2R8a7s9Tq5Zw" }
];

async function getSubscribers(channelId) {
  const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelId}&key=${API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  return parseInt(data.items[0].statistics.subscriberCount);
}

async function loadData() {
  const labels = [];
  const values = [];

  for (const ch of channels) {
    const subs = await getSubscribers(ch.id);
    labels.push(ch.name);
    values.push(subs);
  }

  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "구독자 수",
        data: values
      }]
    }
  });
}

loadData();
</script>

</body>
</html>
