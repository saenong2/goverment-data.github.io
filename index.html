<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정부 유튜브 구독자 비교</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }

    #status {
      margin: 12px 0;
      padding: 10px;
      background: #f4f4f4;
      border-radius: 8px;
    }

    #error {
      margin: 12px 0;
      padding: 10px;
      background: #ffeaea;
      color: #b00020;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    #updated {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }

    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 700px;
    }

    .channel-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      text-decoration: none;
      color: inherit;
    }

    .rank {
      width: 36px;
      font-size: 28px;
      font-weight: 800;
      color: #111;
      text-align: center;
      flex-shrink: 0;
    }

    .channel-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      background: #eee;
      flex-shrink: 0;
    }

    .channel-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .channel-top {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .channel-name {
      font-size: 24px;
      font-weight: 400;
      line-height: 1.2;
    }

    .channel-subs {
      font-size: 30px;
      font-weight: 900;
      color: #111;
      line-height: 1.2;
    }

    .channel-handle {
      font-size: 18px;
      color: #666;
    }
  </style>
</head>
<body>

  <h2>정부 유튜브 구독자 비교</h2>
  <div id="status">불러오는 중...</div>
  <div id="updated"></div>
  <div id="error"></div>

  <div id="result" class="channel-list"></div>

  <script>
    const API_KEY = "AIzaSyBuHQuWnLHeOsIqq56avZQLhjsudm94w54";

    const channels = [
      {
        name: "농림축산식품부",
        handle: "mafrakorea",
        id: "UC014CTCdGJzeQfJtxnnMyjQ"
      },
      {
        name: "국토교통부",
        handle: "korealand",
        id: "UC0G0Z05LATPtpUkxeOrEjOA"
      },
      {
        name: "환경부",
        handle: "mceekorea",
        id: "UCcyXjAdiepuKgmJO2C2fEmA"
      }
    ];

    function formatSubscribers(num) {
      const n = Number(num);
      if (n >= 10000) {
        return (n / 10000).toFixed(1).replace(".0", "") + "만명";
      }
      return n.toLocaleString() + "명";
    }

    async function getChannelData(channel) {
      const url = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channel.id}&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok) {
        throw new Error("API 요청 실패\n" + JSON.stringify(data, null, 2));
      }

      if (!data.items || data.items.length === 0) {
        throw new Error(`채널 정보를 찾지 못했습니다: ${channel.name}`);
      }

      const item = data.items[0];

      return {
        name: channel.name,
        handle: channel.handle,
        url: `https://www.youtube.com/@${channel.handle}`,
        thumbnail: item.snippet.thumbnails.default.url,
        subscriberCount: Number(item.statistics.subscriberCount)
      };
    }

    async function loadChannels() {
      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");

      errorEl.textContent = "";
      statusEl.textContent = "불러오는 중...";

      try {
        const results = [];

        for (const channel of channels) {
          const info = await getChannelData(channel);
          results.push(info);
        }

        results.sort((a, b) => b.subscriberCount - a.subscriberCount);

        statusEl.textContent = "불러오기 완료";
        document.getElementById("updated").textContent =
          "마지막 업데이트: " + new Date().toLocaleTimeString("ko-KR");

        resultEl.innerHTML = results.map((item, index) => `
          <a class="channel-card" href="${item.url}" target="_blank" rel="noopener noreferrer">
            <div class="rank">${index + 1}</div>
            <img class="channel-logo" src="${item.thumbnail}" alt="${item.name} 로고" />
            <div class="channel-info">
              <div class="channel-top">
                <div class="channel-name">${item.name}</div>
                <div class="channel-subs">${formatSubscribers(item.subscriberCount)}</div>
              </div>
              <div class="channel-handle">(@${item.handle})</div>
            </div>
          </a>
        `).join("");

      } catch (err) {
        statusEl.textContent = "불러오기 실패";
        errorEl.textContent = err.message;
        console.error(err);
      }
    }

    loadChannels();
    setInterval(loadChannels, 300000);
  </script>

</body>
</html>
